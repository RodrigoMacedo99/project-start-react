version: '3.8'

services:
  app:
    build:
      context: .
      target: development
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    profiles:
      - dev

  app-prod:
    build:
      context: .
      target: production
    ports:
      - '80:80'
    profiles:
      - prod
